name: apuestas_futbol
description: "App profesional de combinaciones para apuestas deportivas"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^17.3.0

  # Local Database (única BD local — Hive eliminado)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Network & Cache
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.3.2

  # UI / Fonts
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1

  # Export / Share
  share_plus: ^13.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  pdf: ^3.12.0
  rive: ^0.14.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.4
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4
  # isar_generator se ejecuta en un proceso separado para evitar conflicto
  # con riverpod_generator 4.x (incompatibilidad de source_gen).
  # Ver: scripts/generate_isar.sh

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"
