name: apuestas_futbol
description: "App profesional de combinaciones para apuestas deportivas"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local Storage
  hive_flutter: ^1.1.0

  # UI / Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Export / Share
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  pdf: ^3.12.0
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"
